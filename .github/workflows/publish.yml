name: Publish to npm

# Semi-automated: triggered on a version tag push (vX.Y.Z) OR manually.
# A human creates the tag/release — this gates on human intent.
# The CI workflow must pass first (it is listed as a required check on main).
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'   # pre-release: v1.2.3-alpha.1
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (publish with --dry-run, no actual publish)'
        type: boolean
        default: true
        required: false

concurrency:
  group: publish
  cancel-in-progress: false   # Never cancel an in-flight publish

jobs:
  # Re-run the full test & build pipeline before publishing to prevent
  # publishing broken packages even if branch protection bypassed.
  preflight:
    name: Preflight — Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Run all tests
        run: |
          pnpm --filter @webgazer-ts/core test:coverage
          pnpm --filter @webgazer-ts/react test:coverage

      - name: Build all packages
        run: pnpm -r build

      # Cache built artifacts so the publish job doesn't need to rebuild
      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: |
            packages/core/dist/
            packages/react/dist/
          retention-days: 1

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: preflight
    environment:
      name: npm-production
      url: https://www.npmjs.com/package/@webgazer-ts/core
    permissions:
      contents: write    # for creating GitHub Release
      id-token: write    # for npm provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node (with npm registry auth)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          name: built-packages
          path: packages/

      - name: Determine publish flags
        id: flags
        run: |
          if [[ "${{ github.event.inputs.dry_run }}" == "true" ]]; then
            echo "flags=--dry-run" >> "$GITHUB_OUTPUT"
          else
            echo "flags=--provenance --access public" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish @webgazer-ts/core
        run: pnpm publish ${{ steps.flags.outputs.flags }} --no-git-checks
        working-directory: packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @webgazer-ts/react
        run: pnpm publish ${{ steps.flags.outputs.flags }} --no-git-checks
        working-directory: packages/react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.event.inputs.dry_run != 'true'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            packages/core/dist/**
            packages/react/dist/**
