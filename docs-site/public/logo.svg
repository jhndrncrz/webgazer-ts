<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#3eaf7c" opacity="0.1"/>
  
  <!-- Eye outline -->
  <ellipse cx="100" cy="100" rx="60" ry="40" fill="none" stroke="#3eaf7c" stroke-width="4"/>
  
  <!-- Pupil -->
  <circle cx="100" cy="100" r="20" fill="#3eaf7c"/>
  
  <!-- Iris highlight -->
  <circle cx="95" cy="95" r="8" fill="#fff" opacity="0.6"/>
  
  <!-- Crosshair (gaze targeting) -->
  <line x1="100" y1="70" x2="100" y2="85" stroke="#3eaf7c" stroke-width="2"/>
  <line x1="100" y1="115" x2="100" y2="130" stroke="#3eaf7c" stroke-width="2"/>
  <line x1="70" y1="100" x2="85" y2="100" stroke="#3eaf7c" stroke-width="2"/>
  <line x1="115" y1="100" x2="130" y2="100" stroke="#3eaf7c" stroke-width="2"/>
</svg>
